events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # زيادة حجم رفع الملفات
    client_max_body_size 50M;

    server {
        listen 80;
        server_name bashermeqader.com;

        # إعادة التوجيه إلى HTTPS (بعد إضافة الشهادة)
        return 301 https://$server_name$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name bashermeqader.com;

        # شهادات SSL (يتم إضافتها بعد الحصول على الشهادة)
        # ssl_certificate /etc/nginx/ssl/fullchain.pem;
        # ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # الملفات الثابتة
        location /uploads/ {
            alias /usr/share/nginx/html/uploads/;
        }

        location /public/ {
            alias /usr/share/nginx/html/public/;
        }

        location /sites/ {
            alias /usr/share/nginx/html/sites/;
        }

        # واجهة برمجة التطبيقات
        location /api/ {
            proxy_pass http://app:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Webhooks
        location /webhooks/ {
            proxy_pass http://app:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # الموقع الرئيسي ولوحة التحكم
        location / {
            proxy_pass http://app:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # سجلات الأخطاء
        error_log /var/log/nginx/afaq_error.log;
        access_log /var/log/nginx/afaq_access.log;
    }
}