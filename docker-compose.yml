version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: afaq_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: afaq_user
      POSTGRES_PASSWORD: your_strong_password_here
      POSTGRES_DB: afaq_yemen
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - afaq_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afaq_user -d afaq_yemen"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: afaq_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - afaq_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: afaq_app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: afaq_user
      DB_PASSWORD: your_strong_password_here
      DB_NAME: afaq_yemen
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - ./uploads:/app/uploads
      - ./backups:/app/backups
      - ./logs:/app/logs
      - ./src/sites:/app/src/sites
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - afaq_network

  nginx:
    image: nginx:alpine
    container_name: afaq_nginx
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./uploads:/usr/share/nginx/html/uploads
      - ./src/public:/usr/share/nginx/html/public
      - ./src/sites:/usr/share/nginx/html/sites
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app
    networks:
      - afaq_network

volumes:
  postgres_data:
  redis_data:

networks:
  afaq_network:
    driver: bridge